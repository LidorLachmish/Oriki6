</html>

<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>W837J — Pre-Departure Checklist</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght=300;400;600;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">


<style>
/* ============================================================
   style.css — Military Tactical Dashboard | Dark Naval Interface
   ============================================================ */

:root {
  --bg: #050505;
  --card: #111111;
  --card-alt: #161616;
  --border: #292929;
  --red: #C90000;
  --red-dim: #7a0000;
  --text: #FFFFFF;
  --text-dim: #9a9a9a;
  --green: #00C853;
  --amber: #d99a1e;
  --radius: 10px;
  --shadow: 0 8px 24px rgba(0,0,0,.5);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  direction: rtl;
  background: var(--bg);
  color: var(--text);
  font-family: 'Heebo', sans-serif;
  min-height: 100vh;
}

body {
  background-image:
    radial-gradient(circle at 20% 0%, rgba(201,0,0,.06), transparent 40%),
    radial-gradient(circle at 80% 100%, rgba(201,0,0,.05), transparent 40%);
  padding-bottom: 60px;
}

img { max-width: 100%; display: block; }

button { font-family: inherit; cursor: pointer; }
input { font-family: inherit; }

/* ---------- Layout ---------- */
.container {
  max-width: 1400px;
  margin: 0 auto;
  padding: 0 24px;
}

/* ---------- Header ---------- */
.site-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 24px;
  padding: 20px 24px;
  background: linear-gradient(180deg, #0a0a0a, #050505);
  border-bottom: 1px solid var(--border);
  flex-wrap: wrap;
}

.header-side {
  display: flex;
  align-items: center;
  gap: 14px;
  min-width: 0;
}

.header-side img {
  height: 64px;
  width: 64px;
  object-fit: contain;
  filter: drop-shadow(0 0 8px rgba(201,0,0,.4));
}

.ship-tag {
  font-size: .75rem;
  letter-spacing: .12em;
  color: var(--text-dim);
}

.header-center {
  text-align: center;
  flex: 1;
  min-width: 220px;
}

.header-center .vessel-id {
  font-size: 2rem;
  font-weight: 900;
  color: var(--red);
  letter-spacing: .08em;
  text-shadow: 0 0 14px rgba(201,0,0,.5);
}

.header-center .vessel-sub {
  font-size: .85rem;
  color: var(--text-dim);
  letter-spacing: .15em;
  text-transform: uppercase;
  margin-top: 2px;
}

.header-right { justify-content: flex-end; }

/* ---------- Toolbar ---------- */
.toolbar {
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  gap: 12px;
  padding: 16px 0;
}

.toolbar .spacer { flex: 1; }

.search-box {
  position: relative;
  flex: 1;
  min-width: 200px;
  max-width: 320px;
}

.search-box input {
  width: 100%;
  padding: 10px 14px;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  color: var(--text);
  font-size: .9rem;
}

.search-box input:focus { outline: none; border-color: var(--red); }

.filter-group { display: flex; gap: 6px; }

.filter-btn {
  padding: 9px 16px;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  color: var(--text-dim);
  font-size: .82rem;
  transition: all .2s;
}

.filter-btn.active, .filter-btn:hover {
  border-color: var(--red);
  color: var(--text);
  background: rgba(201,0,0,.12);
}

/* ---------- Buttons ---------- */
.btn {
  padding: 10px 18px;
  border-radius: var(--radius);
  border: 1px solid var(--border);
  background: var(--card);
  color: var(--text);
  font-size: .85rem;
  font-weight: 600;
  transition: all .2s ease;
}

.btn:hover { transform: translateY(-1px); box-shadow: var(--shadow); }

.btn-primary { background: var(--red); border-color: var(--red); }
.btn-primary:hover { background: #e60000; }

.btn-danger { background: var(--red-dim); border-color: var(--red); }
.btn-ghost { background: transparent; }

.btn-add-task {
  width: 100%;
  margin-top: 12px;
  background: transparent;
  border: 1px dashed var(--border);
  color: var(--text-dim);
  padding: 8px;
  border-radius: 8px;
  font-size: .82rem;
}
.btn-add-task:hover { border-color: var(--red); color: var(--red); }

/* ---------- Dashboard ---------- */
.dashboard {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
  gap: 14px;
  margin: 18px 0;
}

.stat-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px 18px;
  position: relative;
  overflow: hidden;
}

.stat-card::before {
  content: "";
  position: absolute;
  inset-inline-start: 0;
  top: 0; bottom: 0;
  width: 3px;
  background: var(--red);
}

.stat-label {
  font-size: .72rem;
  color: var(--text-dim);
  letter-spacing: .05em;
  margin-bottom: 6px;
}

.stat-value {
  font-size: 1.5rem;
  font-weight: 800;
}

.mission-ready { color: var(--green); }
.mission-not-ready { color: var(--red); }

.progress-bar-outer {
  height: 8px;
  background: var(--card-alt);
  border: 1px solid var(--border);
  border-radius: 6px;
  overflow: hidden;
  margin: 10px 0 4px;
}

.progress-bar-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--red), #ff3b3b);
  width: 0%;
  transition: width .4s ease;
}

/* ---------- Categories Grid ---------- */
.categories-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
  gap: 16px;
  margin-top: 18px;
}

.card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px;
  box-shadow: var(--shadow);
}

.card-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 10px;
}

.card-title-wrap { display: flex; align-items: baseline; gap: 10px; }

.card-title {
  font-size: 1.05rem;
  font-weight: 800;
  border-right: 3px solid var(--red);
  padding-right: 8px;
}

.card-progress { font-size: .8rem; color: var(--text-dim); }

.card-actions { display: flex; gap: 4px; }

.icon-btn {
  background: transparent;
  border: 1px solid transparent;
  color: var(--text-dim);
  width: 28px; height: 28px;
  border-radius: 6px;
  font-size: .85rem;
  transition: all .15s;
}
.icon-btn:hover { background: var(--card-alt); color: var(--red); border-color: var(--border); }

.card-progress-bar {
  height: 5px;
  background: var(--card-alt);
  border-radius: 4px;
  overflow: hidden;
  margin-bottom: 12px;
}
.card-progress-fill {
  height: 100%;
  background: var(--green);
  transition: width .4s ease;
}

.task-list { list-style: none; display: flex; flex-direction: column; gap: 6px; }

.task-item {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  padding: 8px;
  border-radius: 8px;
  border: 1px solid transparent;
  transition: background .2s, border-color .2s, opacity .3s;
}

.task-item:hover { background: var(--card-alt); border-color: var(--border); }

.task-item.toggling { opacity: .6; }

.task-checkbox-wrap {
  position: relative;
  width: 20px; height: 20px;
  flex-shrink: 0;
  margin-top: 2px;
}

.task-checkbox {
  position: absolute;
  opacity: 0;
  width: 20px; height: 20px;
  cursor: pointer;
}

.checkmark {
  position: absolute;
  inset: 0;
  border: 2px solid var(--border);
  border-radius: 5px;
  background: var(--card-alt);
  transition: all .2s ease;
}

.task-checkbox:checked + .checkmark {
  background: var(--green);
  border-color: var(--green);
}

.task-checkbox:checked + .checkmark::after {
  content: "";
  position: absolute;
  right: 6px; top: 2px;
  width: 5px; height: 10px;
  border: solid #fff;
  border-width: 0 2px 2px 0;
  transform: rotate(45deg);
}

.task-checkbox:hover + .checkmark { border-color: var(--red); }

.task-info { flex: 1; min-width: 0; }

.task-title { font-size: .88rem; transition: color .3s; }

.task-item.completed .task-title {
  color: var(--text-dim);
  text-decoration: line-through;
  text-decoration-color: var(--green);
}

.task-meta {
  display: block;
  font-size: .7rem;
  color: var(--green);
  margin-top: 2px;
}

.task-actions {
  display: flex;
  gap: 2px;
  opacity: 0;
  transition: opacity .2s;
}
.task-item:hover .task-actions { opacity: 1; }

/* ---------- Modal ---------- */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.7);
  backdrop-filter: blur(3px);
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  transition: opacity .2s;
  z-index: 1000;
  padding: 16px;
}
.modal-overlay.show { opacity: 1; }

.modal-box {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  width: 100%;
  max-width: 420px;
  box-shadow: var(--shadow);
  transform: translateY(10px);
  transition: transform .2s;
}
.modal-overlay.show .modal-box { transform: translateY(0); }

.modal-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 16px 18px;
  border-bottom: 1px solid var(--border);
}

.modal-close {
  background: transparent;
  border: none;
  color: var(--text-dim);
  font-size: 1.1rem;
}

.modal-body { padding: 18px; }

.modal-input {
  width: 100%;
  padding: 10px 12px;
  background: var(--card-alt);
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--text);
}
.modal-input:focus { outline: none; border-color: var(--red); }

.modal-footer {
  display: flex;
  justify-content: flex-end;
  gap: 10px;
  padding: 14px 18px;
  border-top: 1px solid var(--border);
}

/* ---------- Toast ---------- */
#toast-container {
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  flex-direction: column;
  gap: 8px;
  z-index: 2000;
}

.toast {
  background: var(--card);
  border: 1px solid var(--border);
  border-right: 4px solid var(--red);
  padding: 12px 18px;
  border-radius: 8px;
  font-size: .85rem;
  box-shadow: var(--shadow);
  opacity: 0;
  transform: translateY(10px);
  transition: all .3s;
}
.toast.show { opacity: 1; transform: translateY(0); }
.toast-success { border-right-color: var(--green); }
.toast-warning { border-right-color: var(--amber); }

/* ---------- Operator Overlay ---------- */
.operator-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.85);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 1500;
  padding: 16px;
}
.operator-overlay.hidden { display: none; }

.operator-box {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 28px;
  width: 100%;
  max-width: 380px;
  text-align: center;
  box-shadow: var(--shadow);
}

.operator-box h2 {
  margin-bottom: 6px;
  color: var(--red);
}

.operator-box p { color: var(--text-dim); font-size: .85rem; margin-bottom: 18px; }

.operator-box .modal-input { margin-bottom: 12px; }

/* ---------- Footer ---------- */
.site-footer {
  text-align: center;
  color: var(--text-dim);
  font-size: .75rem;
  margin-top: 40px;
  padding: 16px;
  border-top: 1px solid var(--border);
}

/* ---------- Responsive ---------- */
@media (max-width: 768px) {
  .site-header { flex-direction: column; text-align: center; }
  .header-center .vessel-id { font-size: 1.4rem; }
  .toolbar { flex-direction: column; align-items: stretch; }
  .search-box { max-width: 100%; }
  .categories-grid { grid-template-columns: 1fr; }
}

/* ---------- Print / PDF Export ---------- */
@media print {
  .print-mode .toolbar,
  .print-mode .task-actions,
  .print-mode .card-actions,
  .print-mode .btn-add-task,
  .print-mode #toast-container,
  .print-mode .operator-overlay,
  .print-mode #modal-root { display: none !important; }

  .print-mode body { background: #fff; color: #000; }
  .print-mode .card { break-inside: avoid; border: 1px solid #999; }
}

</style>
</head>
<body>

<!-- ===== Operator Form Overlay ===== -->
<div class="operator-overlay" id="operator-overlay">
  <form class="operator-box" id="operator-form">
    <h2>זיהוי מבצע</h2>

</header>


<main class="container">

  <!-- ===== Dashboard ===== -->
  <section class="dashboard">
    <div class="stat-card">
      <div class="stat-label">סה"כ משימות</div>
      <div class="stat-value" id="stat-total">0</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">משימות שהושלמו</div>
      <div class="stat-value" id="stat-done">0</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">אחוז ביצוע</div>
      <div class="stat-value" id="stat-percent">0%</div>
      <div class="progress-bar-outer"><div class="progress-bar-fill" id="progress-bar-fill"></div></div>
    </div>
    <div class="stat-card">
      <div class="stat-label">קטגוריות</div>

      <div class="stat-label">מבצע אחרון</div>
      <div class="stat-value" id="stat-last-op" style="font-size:1rem">—</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">תאריך עדכון</div>
      <div class="stat-value" id="stat-updated" style="font-size:.9rem">—</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">סטטוס משימה</div>
      <div class="stat-value" id="mission-status">—</div>

  <!-- ===== Toolbar ===== -->
  <section class="toolbar">
    <button class="btn btn-primary" id="add-category-btn">+ קטגוריה חדשה</button>

      <input type="text" id="search-input" placeholder="חיפוש משימות...">

      <button class="filter-btn active" data-filter="all">הכל</button>
      <button class="filter-btn" data-filter="done">בוצע</button>
      <button class="filter-btn" data-filter="pending">לא בוצע</button>
    </div>
    <button class="btn btn-ghost" id="change-operator-btn">החלפת מבצע</button>

  <!-- ===== Categories Grid ===== -->

<footer class="site-footer">

<!-- ===== Modal & Toast Roots ===== -->
<div id="modal-root"></div>
<div id="toast-container"></div>

<!-- ===== Scripts ===== -->
<script src="js/config.js"></script>
<script src="js/github.js"></script>
<script src="js/checklist.js"></script>
<script src="js/ui.js"></script>

<script>
  // ============================================================
// app.js — נקודת הכניסה הראשית: אתחול, אירועים, Auto Refresh
// ============================================================

(function App() {
  let refreshTimer = null;

  document.addEventListener("DOMContentLoaded", init);

  async function init() {
    bindOperatorForm();
    bindGlobalActions();
    bindGridEvents();

    await ChecklistStore.load();
    ChecklistStore.loadLocalLogs();
    UI.renderAll(ChecklistStore.getState());

    startAutoRefresh();

    if (!GitHubSync.isEnabled()) {
      UI.Toast("מצב מקומי פעיל (ללא GitHub Token) — שינויים נשמרים בדפדפן בלבד", "warning");
    }
  }

  // ---------- טופס מבצע (שם + תאריך) ----------
  function bindOperatorForm() {
    const savedName = localStorage.getItem("lastOperatorName");
    const savedDate = localStorage.getItem("lastOperatorDate");
    const overlay = document.getElementById("operator-overlay");

    if (savedName) {
      overlay.classList.add("hidden");
    } else {
      overlay.classList.remove("hidden");
    }

    document.getElementById("operator-date-input").value = savedDate || ChecklistStore.todayStr();

    document.getElementById("operator-form").addEventListener("submit", e => {
      e.preventDefault();
      const name = document.getElementById("operator-name-input").value.trim();
      const date = document.getElementById("operator-date-input").value;
      if (!name) return;
      localStorage.setItem("lastOperatorName", name);
      localStorage.setItem("lastOperatorDate", date);
      overlay.classList.add("hidden");
      UI.Toast(`ברוך הבא, ${name}`, "success");
      UI.renderAll(ChecklistStore.getState());
    });

    document.getElementById("change-operator-btn").addEventListener("click", () => {
      overlay.classList.remove("hidden");
    });
  }

  // ---------- כפתורים גלובליים ----------
  function bindGlobalActions() {
    document.getElementById("add-category-btn").addEventListener("click", openAddCategoryModal);
    document.getElementById("weekly-reset-btn").addEventListener("click", openResetModal);
    document.getElementById("export-pdf-btn").addEventListener("click", () => UI.exportPDF());

    const searchInput = document.getElementById("search-input");
    searchInput.addEventListener("input", () => {
      UI.setSearch(searchInput.value.trim());
      UI.renderCategories(ChecklistStore.getState());
    });

    document.querySelectorAll(".filter-btn").forEach(btn => {
      btn.addEventListener("click", () => {
        document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
        btn.classList.add("active");
        UI.setFilter(btn.dataset.filter);
        UI.renderCategories(ChecklistStore.getState());
      });
    });
  }

  function getOperatorName() {
    return localStorage.getItem("lastOperatorName") || "אנונימי";
  }

  // ---------- אירועי Grid (Delegation) ----------
  function bindGridEvents() {
    const grid = document.getElementById("categories-grid");

    grid.addEventListener("click", async e => {
      const target = e.target;

      if (target.classList.contains("add-cat-task") || target.classList.contains("btn-add-task")) {
        openAddTaskModal(Number(target.dataset.cat));
      } else if (target.classList.contains("edit-cat-btn")) {
        openEditCategoryModal(Number(target.dataset.cat));
      } else if (target.classList.contains("delete-cat-btn")) {
        openDeleteCategoryModal(Number(target.dataset.cat));
      } else if (target.classList.contains("edit-task-btn")) {
        openEditTaskModal(Number(target.dataset.cat), Number(target.dataset.task));
      } else if (target.classList.contains("delete-task-btn")) {
        openDeleteTaskModal(Number(target.dataset.cat), Number(target.dataset.task));
      }
    });

    grid.addEventListener("change", async e => {
      if (e.target.classList.contains("task-checkbox")) {
        const catId = Number(e.target.dataset.cat);
        const taskId = Number(e.target.dataset.task);
        const li = e.target.closest(".task-item");
        li.classList.add("toggling");
        await ChecklistStore.toggleTask(catId, taskId, getOperatorName());
        UI.renderAll(ChecklistStore.getState());
      }
    });
  }

  // ---------- מודאלים: קטגוריות ----------
  function openAddCategoryModal() {
    UI.Modal({
      title: "הוספת קטגוריה חדשה",
      bodyHTML: `<input type="text" id="modal-cat-name" class="modal-input" placeholder="שם הקטגוריה" autofocus>`,
      confirmText: "הוספה",
      onConfirm: root => {
        const name = root.querySelector("#modal-cat-name").value.trim();
        if (!name) return false;
        ChecklistStore.addCategory(name);
        UI.renderAll(ChecklistStore.getState());
        UI.Toast(`קטגוריה "${name}" נוספה`, "success");
      }
    });
  }

  // קטגוריות Find מקורי
  function openEditCategoryModal(catId) {
    const cat = ChecklistStore.getState().categories.find(c => c.id === catId);
    if (!cat) return;
    UI.Modal({
      title: "עריכת קטגוריה",
      bodyHTML: `<input type="text" id="modal-cat-name" class="modal-input" value="${cat.name}">`,
      confirmText: "שמירה",
      onConfirm: root => {
        const name = root.querySelector("#modal-cat-name").value.trim();
        if (!name) return false;
        ChecklistStore.editCategory(catId, name);
        UI.renderAll(ChecklistStore.getState());
        UI.Toast("הקטגוריה עודכנה", "success");
      }
    });
  }

  function openDeleteCategoryModal(catId) {
    const cat = ChecklistStore.getState().categories.find(c => c.id === catId);
    if (!cat) return;
    UI.Modal({
      title: "מחיקת קטגוריה",
      bodyHTML: `<p>האם למחוק את הקטגוריה "<strong>${cat.name}</strong>" וכל המשימות שבה?</p>`,
      confirmText: "מחיקה",
      danger: true,
      onConfirm: () => {
        ChecklistStore.deleteCategory(catId);
        UI.renderAll(ChecklistStore.getState());
        UI.Toast("הקטגוריה נמחקה", "info");
      }
    });
  }

  // ---------- מודאלים: משימות ----------
  function openAddTaskModal(catId) {
    UI.Modal({
      title: "הוספת משימה",
      bodyHTML: `<input type="text" id="modal-task-title" class="modal-input" placeholder="תיאור המשימה" autofocus>`,
      confirmText: "הוספה",
      onConfirm: root => {
        const title = root.querySelector("#modal-task-title").value.trim();
        if (!title) return false;
        ChecklistStore.addTask(catId, title);
        UI.renderAll(ChecklistStore.getState());
        UI.Toast("משימה נוספה", "success");
      }
    });
  }

  function openEditTaskModal(catId, taskId) {
    const cat = ChecklistStore.getState().categories.find(c => c.id === catId);
    const task = cat && cat.tasks.find(t => t.id === taskId);
    if (!task) return;
    UI.Modal({
      title: "עריכת משימה",
      bodyHTML: `<input type="text" id="modal-task-title" class="modal-input" value="${task.title}">`,
      confirmText: "שמירה",
      onConfirm: root => {
        const title = root.querySelector("#modal-task-title").value.trim();
        if (!title) return false;
        ChecklistStore.editTask(catId, taskId, title);
        UI.renderAll(ChecklistStore.getState());
        UI.Toast("המשימה עודכנה", "success");
      }
    });
  }

  function openDeleteTaskModal(catId, taskId) {
    UI.Modal({
      title: "מחיקת משימה",
      bodyHTML: `<p>האם למחוק משימה זו?</p>`,
      confirmText: "מחיקה",
      danger: true,
      onConfirm: () => {
        ChecklistStore.deleteTask(catId, taskId);
        UI.renderAll(ChecklistStore.getState());
        UI.Toast("המשימה נמחקה", "info");
      }
    });
  }

  // ---------- איפוס שבועי ----------
  function openResetModal() {
    UI.Modal({
      title: "איפוס שבועי",
      bodyHTML: `<p>האם לאפס את כל המשימות בכל הקטגוריות?</p>`,
      confirmText: "איפוס",
      danger: true,
      onConfirm: () => {
        ChecklistStore.resetAllTasks(false);
        UI.renderAll(ChecklistStore.getState());
        UI.Toast("בוצע איפוס שבועי", "success");
      }
    });
  }

  // ---------- Auto Refresh + Weekly Auto Reset ----------
  function startAutoRefresh() {
    const seconds = (CONFIG.autoRefreshSeconds || 10);
    refreshTimer = setInterval(async () => {
      if (!GitHubSync.isEnabled()) return;
      const changed = await ChecklistStore.refreshFromRemote();
      if (changed) {
        UI.renderAll(ChecklistStore.getState());
        UI.Toast("הנתונים עודכנו על-ידי משתמש אחר", "info");
      }
      const wasReset = ChecklistStore.checkWeeklyReset();
      if (wasReset) {
        UI.renderAll(ChecklistStore.getState());
        UI.Toast("בוצע איפוס שבועי אוטומטי", "warning");
      }
    }, seconds * 1000);
  }
})();
</script>

<script>
// ============================================================
// config.js — הגדרות GitHub Sync
// ============================================================
// אזהרת אבטחה חשובה:
// הזנת Personal Access Token כאן חושפת אותו לכל מי שצופה בקוד המקור
// של האתר (כולל מבקרים אנונימיים אם ה-Repository פרטי/ציבורי).
// מומלץ להשתמש בטוקן עם הרשאות מצומצמות ביותר (Fine-grained PAT,
// הרשאת Contents: Read & Write בלבד, על ה-Repository הזה בלבד),
// ולסובב (Rotate) אותו מעת לעת.
//
// אם משאירים token ריק, המערכת תעבוד במצב מקומי (localStorage)
// בלבד, וה-Sync ל-GitHub יהיה מבוטל אוטומטית.
// ============================================================

const CONFIG = {
  token: "",                 // GitHub Personal Access Token
  owner: "",                 // שם המשתמש / הארגון ב-GitHub
  repo: "",                  // שם ה-Repository
  branch: "main",            // הענף לעבודה
  dataPath: "data/checklist.json",
  logsPath: "data/logs.json",
  autoRefreshSeconds: 1,    // תדירות רענון אוטומטי
  resetIntervalDays: 7       // תדירות איפוס שבועי
};

// תיקון קריטי: הפעלת הלוגיקה בצורה בטוחה שתמנע את שיבוש ה-Render של המערכת הראשית
document.addEventListener("DOMContentLoaded", () => {
  const jsonText = document.getElementById("jsonData").textContent;
  const data = JSON.parse(jsonText);
  const app = document.getElementById("app");

  if (app && data && data.categories) {
    data.categories.forEach(category => {
      app.innerHTML += `<h2>${category.name}</h2>`;
      if (category.tasks) {
        category.tasks.forEach(task => {
          app.innerHTML += `
            <div>
              <input type="checkbox">
              ${task.title}
            </div>
          `;
        });
      }
    });
  }
});
</script>
