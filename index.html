<style>
/* ============================================================
   W837J — Military Tactical Dashboard | Dark Naval Interface
   ============================================================ */

:root {
  --bg: #050505;
  --card: #111111;
  --card-alt: #161616;
  --border: #292929;
  --red: #C90000;
  --red-dim: #7a0000;
  --text: #FFFFFF;
  --text-dim: #9a9a9a;
  --green: #00C853;
  --amber: #d99a1e;
  --radius: 10px;
  --shadow: 0 8px 24px rgba(0,0,0,.5);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  direction: rtl;
  background: var(--bg);
  color: var(--text);
  font-family: 'Heebo', sans-serif;
  min-height: 100vh;
}

body {
  background-image:
    radial-gradient(circle at 20% 0%, rgba(201,0,0,.06), transparent 40%),
    radial-gradient(circle at 80% 100%, rgba(201,0,0,.05), transparent 40%);
  padding-bottom: 60px;
}

img { max-width: 100%; display: block; }
button { font-family: inherit; cursor: pointer; }
input, select { font-family: inherit; }

.container { max-width: 1400px; margin: 0 auto; padding: 0 24px; }

/* ---------- Header ---------- */
.site-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 24px;
  padding: 20px 24px;
  background: linear-gradient(180deg, #0a0a0a, #050505);
  border-bottom: 1px solid var(--border);
  flex-wrap: wrap;
}

.header-side { display: flex; align-items: center; gap: 14px; min-width: 0; }

.header-side img {
  height: 64px;
  width: 64px;
  object-fit: contain;
  filter: drop-shadow(0 0 8px rgba(201,0,0,.4));
}

.header-center { text-align: center; flex: 1; min-width: 220px; }

.header-center .vessel-id {
  font-size: 2rem;
  font-weight: 900;
  color: var(--red);
  letter-spacing: .08em;
  text-shadow: 0 0 14px rgba(201,0,0,.5);
}

.header-center .vessel-sub {
  font-size: .85rem;
  color: var(--text-dim);
  letter-spacing: .15em;
  text-transform: uppercase;
  margin-top: 2px;
}

/* ---------- Operator bar (replaces blocking modal) ---------- */
.operator-bar {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 24px;
  background: var(--card-alt);
  border-bottom: 1px solid var(--border);
  flex-wrap: wrap;
  font-size: .85rem;
}

.operator-bar label { color: var(--text-dim); }

.operator-bar input {
  padding: 6px 10px;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--text);
  font-size: .85rem;
  width: 160px;
}
.operator-bar input:focus { outline: none; border-color: var(--red); }

.sync-status { margin-right: auto; font-size: .75rem; color: var(--text-dim); display: flex; align-items: center; gap: 6px; }
.sync-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--text-dim); flex-shrink: 0; }
.sync-dot.live { background: var(--green); box-shadow: 0 0 6px var(--green); }
.sync-dot.local { background: var(--amber); }

/* ---------- Toolbar ---------- */
.toolbar { display: flex; flex-wrap: wrap; align-items: center; gap: 12px; padding: 16px 0; }
.toolbar .spacer { flex: 1; }

.search-box { position: relative; flex: 1; min-width: 200px; max-width: 320px; }
.search-box input {
  width: 100%;
  padding: 10px 14px;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  color: var(--text);
  font-size: .9rem;
}
.search-box input:focus { outline: none; border-color: var(--red); }

.filter-group { display: flex; gap: 6px; }
.filter-btn {
  padding: 9px 16px;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  color: var(--text-dim);
  font-size: .82rem;
  transition: all .2s;
}
.filter-btn.active, .filter-btn:hover {
  border-color: var(--red);
  color: var(--text);
  background: rgba(201,0,0,.12);
}

/* ---------- Buttons ---------- */
.btn {
  padding: 10px 18px;
  border-radius: var(--radius);
  border: 1px solid var(--border);
  background: var(--card);
  color: var(--text);
  font-size: .85rem;
  font-weight: 600;
  transition: all .2s ease;
}
.btn:hover { transform: translateY(-1px); box-shadow: var(--shadow); }
.btn-primary { background: var(--red); border-color: var(--red); }
.btn-primary:hover { background: #e60000; }
.btn-danger { background: var(--red-dim); border-color: var(--red); }
.btn-ghost { background: transparent; }

.btn-add-task {
  width: 100%;
  margin-top: 12px;
  background: transparent;
  border: 1px dashed var(--border);
  color: var(--text-dim);
  padding: 8px;
  border-radius: 8px;
  font-size: .82rem;
}
.btn-add-task:hover { border-color: var(--red); color: var(--red); }

/* ---------- Dashboard ---------- */
.dashboard {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
  gap: 14px;
  margin: 18px 0;
}

.stat-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px 18px;
  position: relative;
  overflow: hidden;
}
.stat-card::before {
  content: "";
  position: absolute;
  inset-inline-start: 0;
  top: 0; bottom: 0;
  width: 3px;
  background: var(--red);
}
.stat-label { font-size: .72rem; color: var(--text-dim); letter-spacing: .05em; margin-bottom: 6px; }
.stat-value { font-size: 1.5rem; font-weight: 800; }
.mission-ready { color: var(--green); }
.mission-not-ready { color: var(--red); }

.progress-bar-outer {
  height: 8px;
  background: var(--card-alt);
  border: 1px solid var(--border);
  border-radius: 6px;
  overflow: hidden;
  margin: 10px 0 4px;
}
.progress-bar-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--red), #ff3b3b);
  width: 0%;
  transition: width .4s ease;
}

/* ---------- Categories Grid ---------- */
.categories-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
  gap: 16px;
  margin-top: 18px;
}

.card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; box-shadow: var(--shadow); }

.card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
.card-title-wrap { display: flex; align-items: baseline; gap: 10px; }
.card-title { font-size: 1.05rem; font-weight: 800; border-right: 3px solid var(--red); padding-right: 8px; }
.card-progress { font-size: .8rem; color: var(--text-dim); }
.card-actions { display: flex; gap: 4px; }

.icon-btn {
  background: transparent;
  border: 1px solid transparent;
  color: var(--text-dim);
  width: 28px; height: 28px;
  border-radius: 6px;
  font-size: .85rem;
  transition: all .15s;
}
.icon-btn:hover { background: var(--card-alt); color: var(--red); border-color: var(--border); }

.card-progress-bar { height: 5px; background: var(--card-alt); border-radius: 4px; overflow: hidden; margin-bottom: 12px; }
.card-progress-fill { height: 100%; background: var(--green); transition: width .4s ease; }

.task-list { list-style: none; display: flex; flex-direction: column; gap: 6px; }

.task-item {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  padding: 8px;
  border-radius: 8px;
  border: 1px solid transparent;
  transition: background .2s, border-color .2s, opacity .3s;
}
.task-item:hover { background: var(--card-alt); border-color: var(--border); }
.task-item.toggling { opacity: .6; }

.task-checkbox-wrap { position: relative; width: 20px; height: 20px; flex-shrink: 0; margin-top: 2px; }
.task-checkbox { position: absolute; opacity: 0; width: 20px; height: 20px; cursor: pointer; }
.checkmark { position: absolute; inset: 0; border: 2px solid var(--border); border-radius: 5px; background: var(--card-alt); transition: all .2s ease; }
.task-checkbox:checked + .checkmark { background: var(--green); border-color: var(--green); }
.task-checkbox:checked + .checkmark::after {
  content: "";
  position: absolute;
  right: 6px; top: 2px;
  width: 5px; height: 10px;
  border: solid #fff;
  border-width: 0 2px 2px 0;
  transform: rotate(45deg);
}
.task-checkbox:hover + .checkmark { border-color: var(--red); }

.task-info { flex: 1; min-width: 0; }
.task-title { font-size: .88rem; transition: color .3s; }
.task-item.completed .task-title { color: var(--text-dim); text-decoration: line-through; text-decoration-color: var(--green); }

.task-meta { display: flex; align-items: center; gap: 6px; font-size: .7rem; color: var(--text-dim); margin-top: 3px; flex-wrap: wrap; }
.task-status-pill {
  font-size: .65rem;
  font-weight: 700;
  padding: 2px 8px;
  border-radius: 20px;
  letter-spacing: .03em;
}
.task-status-pill.done { background: rgba(0,200,83,.15); color: var(--green); border: 1px solid var(--green); }
.task-status-pill.pending { background: rgba(201,0,0,.12); color: var(--red); border: 1px solid var(--red-dim); }
.task-owner { color: var(--text-dim); }
.task-owner b { color: var(--text); font-weight: 600; }

.task-actions { display: flex; gap: 2px; opacity: 0; transition: opacity .2s; }
.task-item:hover .task-actions { opacity: 1; }

/* ---------- Modal ---------- */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.7);
  backdrop-filter: blur(3px);
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  transition: opacity .2s;
  z-index: 1000;
  padding: 16px;
}
.modal-overlay.show { opacity: 1; }

.modal-box {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  width: 100%;
  max-width: 420px;
  box-shadow: var(--shadow);
  transform: translateY(10px);
  transition: transform .2s;
}
.modal-overlay.show .modal-box { transform: translateY(0); }

.modal-header { display: flex; justify-content: space-between; align-items: center; padding: 16px 18px; border-bottom: 1px solid var(--border); }
.modal-close { background: transparent; border: none; color: var(--text-dim); font-size: 1.1rem; }
.modal-body { padding: 18px; }
.modal-input { width: 100%; padding: 10px 12px; background: var(--card-alt); border: 1px solid var(--border); border-radius: 8px; color: var(--text); margin-bottom: 10px; }
.modal-input:focus { outline: none; border-color: var(--red); }
.modal-footer { display: flex; justify-content: flex-end; gap: 10px; padding: 14px 18px; border-top: 1px solid var(--border); }

/* ---------- Toast ---------- */
#toast-container { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); display: flex; flex-direction: column; gap: 8px; z-index: 2000; }
.toast {
  background: var(--card);
  border: 1px solid var(--border);
  border-right: 4px solid var(--red);
  padding: 12px 18px;
  border-radius: 8px;
  font-size: .85rem;
  box-shadow: var(--shadow);
  opacity: 0;
  transform: translateY(10px);
  transition: all .3s;
}
.toast.show { opacity: 1; transform: translateY(0); }
.toast-success { border-right-color: var(--green); }
.toast-warning { border-right-color: var(--amber); }
.toast-info { border-right-color: var(--text-dim); }

/* ---------- Footer ---------- */
.site-footer { text-align: center; color: var(--text-dim); font-size: .75rem; margin-top: 40px; padding: 16px; border-top: 1px solid var(--border); }

/* ---------- Responsive ---------- */
@media (max-width: 768px) {
  .site-header { flex-direction: column; text-align: center; }
  .header-center .vessel-id { font-size: 1.4rem; }
  .toolbar { flex-direction: column; align-items: stretch; }
  .search-box { max-width: 100%; }
  .categories-grid { grid-template-columns: 1fr; }
  .operator-bar { justify-content: center; }
  .sync-status { margin-right: 0; order: -1; width: 100%; justify-content: center; }
}

/* ---------- Print / PDF Export ---------- */
@media print {
  .print-mode .toolbar,
  .print-mode .operator-bar,
  .print-mode .task-actions,
  .print-mode .card-actions,
  .print-mode .btn-add-task,
  .print-mode #toast-container,
  .print-mode #modal-root { display: none !important; }
  .print-mode body { background: #fff; color: #000; }
  .print-mode .card { break-inside: avoid; border: 1px solid #999; }
}
</style>

<!-- ===== Config (GitHub Sync — optional, enables true live sync for all visitors) ===== -->
<script>
// ============================================================
// CONFIG — הגדרות סנכרון GitHub
// ============================================================
// כדי שכל מי שפותח את הריפוזיטורי יראה עדכון חי בזמן אמת,
// יש למלא כאן Personal Access Token עם הרשאת Contents:Read&Write
// על הריפו הזה בלבד (Fine-grained PAT), בעל owner/repo תואמים.
// אם משאירים token ריק — המערכת עובדת במצב מקומי (כל מכשיר
// שומר את הנתונים שלו בנפרד בדפדפן, ללא סנכרון בין משתמשים).
//
// אזהרת אבטחה: טוקן המוזן כאן גלוי לכל מי שצופה בקוד המקור.
// מומלץ טוקן עם הרשאות מצומצמות בלבד, ולסובב (Rotate) מעת לעת.
// ============================================================
const CONFIG = {
  token: "",                       // GitHub Personal Access Token (השאר ריק למצב מקומי)
  owner: "",                       // שם המשתמש/הארגון ב-GitHub
  repo: "",                        // שם ה-Repository
  branch: "main",
  dataPath: "data/checklist.json", // קובץ המצב המשותף
  autoRefreshSeconds: 8,
  resetIntervalDays: 7
};
</script>

<!-- ===== Scripts ===== -->
<script>
(function () {
"use strict";

/* ============================================================
   GitHubSync — שכבת תקשורת מול GitHub Contents API
   ============================================================ */
const GitHubSync = (() => {
  let sha = null;

  function isEnabled() {
    return !!(CONFIG.token && CONFIG.owner && CONFIG.repo);
  }

  function apiUrl() {
    return `https://api.github.com/repos/${CONFIG.owner}/${CONFIG.repo}/contents/${CONFIG.dataPath}`;
  }

  async function fetchRemote() {
    if (!isEnabled()) return null;
    try {
      const res = await fetch(`${apiUrl()}?ref=${CONFIG.branch}&t=${Date.now()}`, {
        headers: {
          Authorization: `token ${CONFIG.token}`,
          Accept: "application/vnd.github.v3+json"
        }
      });
      if (res.status === 404) return null; // הקובץ עוד לא קיים
      if (!res.ok) throw new Error("GitHub fetch failed: " + res.status);
      const json = await res.json();
      sha = json.sha;
      const decoded = decodeURIComponent(escape(atob(json.content)));
      return JSON.parse(decoded);
    } catch (err) {
      console.error("GitHubSync.fetchRemote error", err);
      return null;
    }
  }

  async function pushRemote(state) {
    if (!isEnabled()) return false;
    try {
      const content = btoa(unescape(encodeURIComponent(JSON.stringify(state, null, 2))));
      const body = {
        message: `עדכון צ'קליסט — ${new Date().toLocaleString("he-IL")}`,
        content,
        branch: CONFIG.branch
      };
      if (sha) body.sha = sha;
      const res = await fetch(apiUrl(), {
        method: "PUT",
        headers: {
          Authorization: `token ${CONFIG.token}`,
          Accept: "application/vnd.github.v3+json"
        },
        body: JSON.stringify(body)
      });
      if (!res.ok) {
        // אם ה-sha התיישן (מישהו אחר עדכן קודם) — נטען מחדש ונוותר על הדחיפה הזו
        if (res.status === 409 || res.status === 422) {
          await fetchRemote();
        }
        throw new Error("GitHub push failed: " + res.status);
      }
      const json = await res.json();
      sha = json.content.sha;
      return true;
    } catch (err) {
      console.error("GitHubSync.pushRemote error", err);
      return false;
    }
  }

  return { isEnabled, fetchRemote, pushRemote };
})();

/* ============================================================
   ChecklistStore — ניהול המצב (state) + שמירה
   ============================================================ */
const ChecklistStore = (() => {
  let state = null;
  const LOCAL_KEY = "w837j_checklist_state_v1";

  function todayStr() {
    return new Date().toISOString().slice(0, 10);
  }

  function seedState() {
    const jsonText = document.getElementById("jsonData").textContent;
    const seed = JSON.parse(jsonText);
    seed.categories.forEach(cat => {
      cat.tasks.forEach(t => {
        t.done = !!t.done;
        t.doneBy = t.doneBy || null;
        t.doneAt = t.doneAt || null;
      });
    });
    return seed;
  }

  function loadLocal() {
    try {
      const raw = localStorage.getItem(LOCAL_KEY);
      return raw ? JSON.parse(raw) : null;
    } catch {
      return null;
    }
  }

  function saveLocal() {
    try {
      localStorage.setItem(LOCAL_KEY, JSON.stringify(state));
    } catch (err) {
      console.error("saveLocal error", err);
    }
  }

  async function load() {
    if (GitHubSync.isEnabled()) {
      const remote = await GitHubSync.fetchRemote();
      state = remote || loadLocal() || seedState();
      if (!remote) await GitHubSync.pushRemote(state); // יוצר את הקובץ בפעם הראשונה
    } else {
      state = loadLocal() || seedState();
    }
  }

  async function persist() {
    saveLocal();
    if (GitHubSync.isEnabled()) {
      await GitHubSync.pushRemote(state);
    }
  }

  async function refreshFromRemote() {
    if (!GitHubSync.isEnabled()) return false;
    const remote = await GitHubSync.fetchRemote();
    if (!remote) return false;
    const changed = JSON.stringify(remote) !== JSON.stringify(state);
    if (changed) {
      state = remote;
      saveLocal();
    }
    return changed;
  }

  function getState() { return state; }

  function getOperatorName() {
    const input = document.getElementById("operator-name-input");
    const name = (input && input.value.trim()) || localStorage.getItem("w837j_operator") || "אנונימי";
    return name;
  }

  async function toggleTask(catId, taskId) {
    const cat = state.categories.find(c => c.id === catId);
    const task = cat && cat.tasks.find(t => t.id === taskId);
    if (!task) return;
    task.done = !task.done;
    if (task.done) {
      task.doneBy = getOperatorName();
      task.doneAt = new Date().toLocaleString("he-IL");
    } else {
      task.doneBy = null;
      task.doneAt = null;
    }
    await persist();
  }

  function addCategory(name) {
    const id = Date.now();
    state.categories.push({ id, name, icon: "🗂️", tasks: [] });
    return persist();
  }

  function editCategory(catId, name) {
    const cat = state.categories.find(c => c.id === catId);
    if (cat) cat.name = name;
    return persist();
  }

  function deleteCategory(catId) {
    state.categories = state.categories.filter(c => c.id !== catId);
    return persist();
  }

  function addTask(catId, title) {
    const cat = state.categories.find(c => c.id === catId);
    if (!cat) return;
    const id = Date.now();
    cat.tasks.push({ id, title, done: false, doneBy: null, doneAt: null });
    return persist();
  }

  function editTask(catId, taskId, title) {
    const cat = state.categories.find(c => c.id === catId);
    const task = cat && cat.tasks.find(t => t.id === taskId);
    if (task) task.title = title;
    return persist();
  }

  function deleteTask(catId, taskId) {
    const cat = state.categories.find(c => c.id === catId);
    if (!cat) return;
    cat.tasks = cat.tasks.filter(t => t.id !== taskId);
    return persist();
  }

  function resetAllTasks() {
    state.categories.forEach(cat => {
      cat.tasks.forEach(t => {
        t.done = false;
        t.doneBy = null;
        t.doneAt = null;
      });
    });
    state.lastResetDate = todayStr();
    return persist();
  }

  function checkWeeklyReset() {
    if (!state.lastResetDate) {
      state.lastResetDate = todayStr();
      return false;
    }
    const last = new Date(state.lastResetDate);
    const now = new Date();
    const diffDays = (now - last) / (1000 * 60 * 60 * 24);
    if (diffDays >= (CONFIG.resetIntervalDays || 7)) {
      resetAllTasks();
      return true;
    }
    return false;
  }

  return {
    load, getState, toggleTask, addCategory, editCategory, deleteCategory,
    addTask, editTask, deleteTask, resetAllTasks, checkWeeklyReset, todayStr,
    refreshFromRemote
  };
})();

/* ============================================================
   UI — רינדור וממשק
   ============================================================ */
const UI = (() => {
  let searchTerm = "";
  let filter = "all";

  function setSearch(term) { searchTerm = term.toLowerCase(); }
  function setFilter(f) { filter = f; }

  function Toast(message, type = "info") {
    const container = document.getElementById("toast-container");
    const el = document.createElement("div");
    el.className = `toast toast-${type}`;
    el.textContent = message;
    container.appendChild(el);
    requestAnimationFrame(() => el.classList.add("show"));
    setTimeout(() => {
      el.classList.remove("show");
      setTimeout(() => el.remove(), 300);
    }, 3000);
  }

  function Modal({ title, bodyHTML, confirmText = "אישור", danger = false, onConfirm }) {
    const root = document.getElementById("modal-root");
    root.innerHTML = `
      <div class="modal-overlay" id="active-modal">
        <div class="modal-box">
          <div class="modal-header">
            <strong>${title}</strong>
            <button class="modal-close" id="modal-close-btn">✕</button>
          </div>
          <div class="modal-body">${bodyHTML}</div>
          <div class="modal-footer">
            <button class="btn btn-ghost" id="modal-cancel-btn">ביטול</button>
            <button class="btn ${danger ? "btn-danger" : "btn-primary"}" id="modal-confirm-btn">${confirmText}</button>
          </div>
        </div>
      </div>`;
    const overlay = document.getElementById("active-modal");
    requestAnimationFrame(() => overlay.classList.add("show"));

    function close() {
      overlay.classList.remove("show");
      setTimeout(() => { root.innerHTML = ""; }, 200);
    }

    document.getElementById("modal-close-btn").addEventListener("click", close);
    document.getElementById("modal-cancel-btn").addEventListener("click", close);
    overlay.addEventListener("click", e => { if (e.target === overlay) close(); });
    document.getElementById("modal-confirm-btn").addEventListener("click", async () => {
      const result = await onConfirm(overlay);
      if (result !== false) close();
    });
  }

  function escapeHTML(str) {
    return String(str)
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;");
  }

  function taskMatchesFilters(task) {
    if (filter === "done" && !task.done) return false;
    if (filter === "pending" && task.done) return false;
    if (searchTerm && !task.title.toLowerCase().includes(searchTerm)) return false;
    return true;
  }

  function renderCategories(state) {
    const grid = document.getElementById("categories-grid");
    grid.innerHTML = "";

    state.categories.forEach(cat => {
      const visibleTasks = cat.tasks.filter(taskMatchesFilters);
      if ((searchTerm || filter !== "all") && visibleTasks.length === 0) return;

      const doneCount = cat.tasks.filter(t => t.done).length;
      const total = cat.tasks.length;
      const pct = total ? Math.round((doneCount / total) * 100) : 0;

      const card = document.createElement("div");
      card.className = "card";
      card.innerHTML = `
        <div class="card-header">
          <div class="card-title-wrap">
            <span class="card-title">${cat.icon || "🗂️"} ${escapeHTML(cat.name)}</span>
            <span class="card-progress">${doneCount}/${total}</span>
          </div>
          <div class="card-actions">
            <button class="icon-btn edit-cat-btn" data-cat="${cat.id}" title="עריכת קטגוריה">✎</button>
            <button class="icon-btn delete-cat-btn" data-cat="${cat.id}" title="מחיקת קטגוריה">🗑</button>
          </div>
        </div>
        <div class="card-progress-bar"><div class="card-progress-fill" style="width:${pct}%"></div></div>
        <ul class="task-list">
          ${visibleTasks.map(t => taskItemHTML(cat.id, t)).join("")}
        </ul>
        <button class="btn-add-task" data-cat="${cat.id}">+ הוספת משימה</button>
      `;
      grid.appendChild(card);
    });

    if (!grid.children.length) {
      grid.innerHTML = `<div class="card" style="text-align:center;color:var(--text-dim)">לא נמצאו משימות תואמות</div>`;
    }
  }

  function taskItemHTML(catId, task) {
    return `
      <li class="task-item ${task.done ? "completed" : ""}" data-task="${task.id}">
        <div class="task-checkbox-wrap">
          <input type="checkbox" class="task-checkbox" data-cat="${catId}" data-task="${task.id}" ${task.done ? "checked" : ""}>
          <span class="checkmark"></span>
        </div>
        <div class="task-info">
          <div class="task-title">${escapeHTML(task.title)}</div>
          <div class="task-meta">
            <span class="task-status-pill ${task.done ? "done" : "pending"}">${task.done ? "בוצעה" : "לא בוצעה"}</span>
            ${task.done && task.doneBy ? `<span class="task-owner">ע״י <b>${escapeHTML(task.doneBy)}</b>${task.doneAt ? " · " + escapeHTML(task.doneAt) : ""}</span>` : ""}
          </div>
        </div>
        <div class="task-actions">
          <button class="icon-btn edit-task-btn" data-cat="${catId}" data-task="${task.id}" title="עריכה">✎</button>
          <button class="icon-btn delete-task-btn" data-cat="${catId}" data-task="${task.id}" title="מחיקה">🗑</button>
        </div>
      </li>`;
  }

  function renderDashboard(state) {
    let total = 0, done = 0;
    state.categories.forEach(c => {
      total += c.tasks.length;
      done += c.tasks.filter(t => t.done).length;
    });
    const pct = total ? Math.round((done / total) * 100) : 0;

    document.getElementById("stat-total").textContent = total;
    document.getElementById("stat-done").textContent = done;
    document.getElementById("stat-percent").textContent = pct + "%";
    document.getElementById("stat-categories").textContent = state.categories.length;
    document.getElementById("stat-updated").textContent = state.lastResetDate || "—";
    document.getElementById("progress-bar-fill").style.width = pct + "%";

    const missionEl = document.getElementById("mission-status");
    if (pct === 100) {
      missionEl.textContent = "מוכן";
      missionEl.className = "stat-value mission-ready";
    } else {
      missionEl.textContent = "לא מוכן";
      missionEl.className = "stat-value mission-not-ready";
    }
  }

  function renderSyncStatus() {
    const dot = document.getElementById("sync-dot");
    const text = document.getElementById("sync-text");
    if (GitHubSync.isEnabled()) {
      dot.className = "sync-dot live";
      text.textContent = "סנכרון חי פעיל — כל המשתמשים רואים עדכון בזמן אמת";
    } else {
      dot.className = "sync-dot local";
      text.textContent = "מצב מקומי בלבד (אין GitHub Token) — נא להגדיר ב-CONFIG לסנכרון חי";
    }
  }

  function renderAll(state) {
    renderDashboard(state);
    renderCategories(state);
    renderSyncStatus();
  }

  function exportPDF() {
    document.body.classList.add("print-mode");
    window.print();
    setTimeout(() => document.body.classList.remove("print-mode"), 500);
  }

  return { Toast, Modal, renderAll, renderCategories, setSearch, setFilter, exportPDF };
})();

/* ============================================================
   App — אתחול ואירועים
   ============================================================ */
let refreshTimer = null;

document.addEventListener("DOMContentLoaded", init);

async function init() {
  bindOperatorInput();
  bindGlobalActions();
  bindGridEvents();

  await ChecklistStore.load();
  UI.renderAll(ChecklistStore.getState());

  startAutoRefresh();

  if (!GitHubSync.isEnabled()) {
    UI.Toast("מצב מקומי פעיל (ללא GitHub Token) — שינויים נשמרים בדפדפן הזה בלבד", "warning");
  } else {
    UI.Toast("מחובר לסנכרון חי דרך GitHub", "success");
  }
}

function bindOperatorInput() {
  const input = document.getElementById("operator-name-input");
  const saved = localStorage.getItem("w837j_operator");
  if (saved) input.value = saved;
  input.addEventListener("change", () => {
    localStorage.setItem("w837j_operator", input.value.trim());
  });
}

function bindGlobalActions() {
  document.getElementById("add-category-btn").addEventListener("click", openAddCategoryModal);
  document.getElementById("weekly-reset-btn").addEventListener("click", openResetModal);
  document.getElementById("export-pdf-btn").addEventListener("click", () => UI.exportPDF());

  const searchInput = document.getElementById("search-input");
  searchInput.addEventListener("input", () => {
    UI.setSearch(searchInput.value.trim());
    UI.renderCategories(ChecklistStore.getState());
  });

  document.querySelectorAll(".filter-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      UI.setFilter(btn.dataset.filter);
      UI.renderCategories(ChecklistStore.getState());
    });
  });
}

function bindGridEvents() {
  const grid = document.getElementById("categories-grid");

  grid.addEventListener("click", e => {
    const target = e.target;
    if (target.classList.contains("btn-add-task")) {
      openAddTaskModal(Number(target.dataset.cat));
    } else if (target.classList.contains("edit-cat-btn")) {
      openEditCategoryModal(Number(target.dataset.cat));
    } else if (target.classList.contains("delete-cat-btn")) {
      openDeleteCategoryModal(Number(target.dataset.cat));
    } else if (target.classList.contains("edit-task-btn")) {
      openEditTaskModal(Number(target.dataset.cat), Number(target.dataset.task));
    } else if (target.classList.contains("delete-task-btn")) {
      openDeleteTaskModal(Number(target.dataset.cat), Number(target.dataset.task));
    }
  });

  grid.addEventListener("change", async e => {
    if (e.target.classList.contains("task-checkbox")) {
      const catId = Number(e.target.dataset.cat);
      const taskId = Number(e.target.dataset.task);
      const li = e.target.closest(".task-item");
      li.classList.add("toggling");
      await ChecklistStore.toggleTask(catId, taskId);
      UI.renderAll(ChecklistStore.getState());
    }
  });
}

function openAddCategoryModal() {
  UI.Modal({
    title: "הוספת קטגוריה חדשה",
    bodyHTML: `<input type="text" id="modal-cat-name" class="modal-input" placeholder="שם הקטגוריה" autofocus>`,
    confirmText: "הוספה",
    onConfirm: async root => {
      const name = root.querySelector("#modal-cat-name").value.trim();
      if (!name) return false;
      await ChecklistStore.addCategory(name);
      UI.renderAll(ChecklistStore.getState());
      UI.Toast(`קטגוריה "${name}" נוספה`, "success");
    }
  });
}

function openEditCategoryModal(catId) {
  const cat = ChecklistStore.getState().categories.find(c => c.id === catId);
  if (!cat) return;
  UI.Modal({
    title: "עריכת קטגוריה",
    bodyHTML: `<input type="text" id="modal-cat-name" class="modal-input" value="${cat.name}">`,
    confirmText: "שמירה",
    onConfirm: async root => {
      const name = root.querySelector("#modal-cat-name").value.trim();
      if (!name) return false;
      await ChecklistStore.editCategory(catId, name);
      UI.renderAll(ChecklistStore.getState());
      UI.Toast("הקטגוריה עודכנה", "success");
    }
  });
}

function openDeleteCategoryModal(catId) {
  const cat = ChecklistStore.getState().categories.find(c => c.id === catId);
  if (!cat) return;
  UI.Modal({
    title: "מחיקת קטגוריה",
    bodyHTML: `<p>האם למחוק את הקטגוריה "<strong>${cat.name}</strong>" וכל המשימות שבה?</p>`,
    confirmText: "מחיקה",
    danger: true,
    onConfirm: async () => {
      await ChecklistStore.deleteCategory(catId);
      UI.renderAll(ChecklistStore.getState());
      UI.Toast("הקטגוריה נמחקה", "info");
    }
  });
}

function openAddTaskModal(catId) {
  UI.Modal({
    title: "הוספת משימה",
    bodyHTML: `<input type="text" id="modal-task-title" class="modal-input" placeholder="תיאור המשימה" autofocus>`,
    confirmText: "הוספה",
    onConfirm: async root => {
      const title = root.querySelector("#modal-task-title").value.trim();
      if (!title) return false;
      await ChecklistStore.addTask(catId, title);
      UI.renderAll(ChecklistStore.getState());
      UI.Toast("משימה נוספה", "success");
    }
  });
}

function openEditTaskModal(catId, taskId) {
  const cat = ChecklistStore.getState().categories.find(c => c.id === catId);
  const task = cat && cat.tasks.find(t => t.id === taskId);
  if (!task) return;
  UI.Modal({
    title: "עריכת משימה",
    bodyHTML: `<input type="text" id="modal-task-title" class="modal-input" value="${task.title}">`,
    confirmText: "שמירה",
    onConfirm: async root => {
      const title = root.querySelector("#modal-task-title").value.trim();
      if (!title) return false;
      await ChecklistStore.editTask(catId, taskId, title);
      UI.renderAll(ChecklistStore.getState());
      UI.Toast("המשימה עודכנה", "success");
    }
  });
}

function openDeleteTaskModal(catId, taskId) {
  UI.Modal({
    title: "מחיקת משימה",
    bodyHTML: `<p>האם למחוק משימה זו?</p>`,
    confirmText: "מחיקה",
    danger: true,
    onConfirm: async () => {
      await ChecklistStore.deleteTask(catId, taskId);
      UI.renderAll(ChecklistStore.getState());
      UI.Toast("המשימה נמחקה", "info");
    }
  });
}

function openResetModal() {
  UI.Modal({
    title: "איפוס שבועי",
    bodyHTML: `<p>האם לאפס את כל המשימות בכל הקטגוריות?</p>`,
    confirmText: "איפוס",
    danger: true,
    onConfirm: async () => {
      await ChecklistStore.resetAllTasks();
      UI.renderAll(ChecklistStore.getState());
      UI.Toast("בוצע איפוס שבועי", "success");
    }
  });
}

function startAutoRefresh() {
  const seconds = CONFIG.autoRefreshSeconds || 8;
  refreshTimer = setInterval(async () => {
    if (!GitHubSync.isEnabled()) return;
    const changed = await ChecklistStore.refreshFromRemote();
    if (changed) {
      UI.renderAll(ChecklistStore.getState());
      UI.Toast("הנתונים עודכנו על-ידי משתמש אחר", "info");
    }
    const wasReset = ChecklistStore.checkWeeklyReset();
    if (wasReset) {
      UI.renderAll(ChecklistStore.getState());
      UI.Toast("בוצע איפוס שבועי אוטומטי", "warning");
    }
  }, seconds * 1000);
}

})();
</script>

</body>
</html>
